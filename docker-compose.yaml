services:
  postgres:
    image: postgres:17

    container_name: ShaadiBio-postgres

    env_file: .env

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    networks:
      - ShaadiBio-net

  redis:
    image: redis:7

    container_name: ShaadiBio-redis

    ports:
      - "6379:6379"

    volumes:
      - redisdata:/data

    networks:
      - ShaadiBio-net

volumes:
  pgdata:
  redisdata:

networks:
  ShaadiBio-net:
